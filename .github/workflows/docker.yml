name: Docker Build & Push

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer version to publish (e.g. v1.2.3). Empty uses package.json.'
        required: false
        type: string
      publish_latest:
        description: 'Also publish the latest tag'
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PUBLISH_LATEST: ${{ inputs.publish_latest }}
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          elif [[ -n "${INPUT_VERSION}" ]]; then
            version="${INPUT_VERSION}"
          else
            version="v$(node -p "require('./package.json').version")"
          fi

          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version must look like v1.2.3"
            exit 1
          fi

          publish_latest="${INPUT_PUBLISH_LATEST:-true}"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            publish_latest="true"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "publish_latest=${publish_latest}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/wiesty/bsibroadcast
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.publish_latest == 'true' }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
